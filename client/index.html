<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>OmniAgent — Your All-Capable AI Agent</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      @keyframes glow {
        0%, 100% { text-shadow: 0 0 10px rgba(0, 217, 255, 0.5); }
        50% { text-shadow: 0 0 20px rgba(0, 217, 255, 0.8), 0 0 30px rgba(157, 78, 221, 0.5); }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 10px rgba(0, 217, 255, 0.3); }
        50% { box-shadow: 0 0 20px rgba(0, 217, 255, 0.6), 0 0 30px rgba(157, 78, 221, 0.3); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes scan-lines {
        0% { background-position: 0 0; }
        100% { background-position: 0 10px; }
      }
    </style>
  </head>

  <body style="font-family: 'Roboto Mono', monospace;">
    <div id="root" style="background: linear-gradient(135deg, #0a0e27 0%, #1a0f2e 100%); min-height: 100vh;"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
