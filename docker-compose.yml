version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      VITE_APP_ID: ${VITE_APP_ID}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL}
    restart: unless-stopped
